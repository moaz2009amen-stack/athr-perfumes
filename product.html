<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">تحميل... | أثر | ATHR</title>
<meta name="description" content="صفحة منتج مفصلة - متجر أثر للعطور">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#c9a84c;--gold-light:#e2c97e;--gold-dark:#9a7a2e;
  --bg:#080808;--bg2:#111111;--bg3:#1a1a1a;
  --text:#f5f0e8;--gray:#888;
  --border:rgba(201,168,76,0.15);
  --nav-bg:rgba(8,8,8,0.95);
  --card-bg:#1a1a1a;--modal-bg:#111111;
  --red:#c94c4c;--green:#4caf50;
}
body.light{
  --bg:#f5f0e8;--bg2:#ede8dc;--bg3:#e0dace;
  --text:#1a1209;--gray:#666;--border:rgba(201,168,76,0.3);
  --nav-bg:rgba(245,240,232,0.97);--card-bg:#ede8dc;--modal-bg:#f5f0e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;transition:background .4s,color .4s;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold);}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:18px 60px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,var(--nav-bg),transparent);
  backdrop-filter:blur(10px);transition:background .4s;
}
.nav-links{display:flex;gap:30px;list-style:none;align-items:center;}
.nav-links a{
  color:var(--text);text-decoration:none;font-size:14px;
  letter-spacing:2px;font-family:'Playfair Display',serif;
  transition:color .3s;position:relative;
}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .3s;}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{transform:scaleX(1);}
.nav-controls{display:flex;gap:8px;align-items:center;}
.toggle-btn{
  background:transparent;border:1px solid rgba(201,168,76,0.4);
  color:var(--text);padding:6px 12px;font-family:'Tajawal',sans-serif;
  font-size:13px;cursor:pointer;transition:all .3s;
}
.toggle-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:var(--gold);}

/* CART ICON */
.cart-icon-btn{
  position:relative;background:transparent;
  border:1px solid rgba(201,168,76,0.4);
  color:var(--text);padding:6px 14px;
  font-family:'Tajawal',sans-serif;font-size:13px;
  cursor:pointer;transition:all .3s;
}
.cart-icon-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);border-color:var(--gold);}
.cart-badge{
  position:absolute;top:-7px;left:-7px;
  background:var(--red);color:#fff;
  font-size:10px;width:18px;height:18px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-weight:700;
}
.cart-badge.show{display:flex;}

/* USER MENU */
.user-menu{position:relative;}
.user-avatar{
  width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;
  background:rgba(201,168,76,.1);color:var(--gold);font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Tajawal',sans-serif;transition:all .3s;
}
.user-avatar:hover{background:rgba(201,168,76,.2);}
.user-dropdown{
  position:absolute;top:46px;left:0;background:var(--modal-bg);
  border:1px solid rgba(201,168,76,.3);min-width:180px;display:none;
  z-index:100;box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.user-dropdown.open{display:block;}
.user-dropdown a{
  display:block;padding:12px 16px;color:var(--text);text-decoration:none;
  font-size:13px;letter-spacing:1px;transition:background .3s;
}
.user-dropdown a:hover{background:rgba(201,168,76,.05);color:var(--gold);}
.user-dropdown hr{border:none;border-top:1px solid var(--border);margin:4px 0;}

/* PRODUCT DETAIL PAGE */
.product-detail-container{
  max-width:1400px;margin:120px auto 60px;
  padding:0 40px;
  display:grid;grid-template-columns:1fr 1fr;gap:60px;
  animation:fadeUp .6s ease-out;
}

/* IMAGE GALLERY */
.product-gallery{
  position:sticky;top:140px;height:fit-content;
}
.main-image-wrap{
  position:relative;height:500px;background:var(--bg3);
  border:1px solid var(--border);overflow:hidden;
  margin-bottom:20px;
}
.main-image{
  width:100%;height:100%;object-fit:cover;
  transition:transform .6s;
}
.main-image-wrap:hover .main-image{transform:scale(1.05);}
.image-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--gray);
}
.image-placeholder svg{opacity:0.3;margin-bottom:10px;}
.thumbnail-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.thumbnail{
  height:80px;background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;transition:all .3s;overflow:hidden;
}
.thumbnail.active{border-color:var(--gold);box-shadow:0 0 15px rgba(201,168,76,.2);}
.thumbnail img{width:100%;height:100%;object-fit:cover;}

/* PRODUCT INFO */
.product-info-section{padding:20px 0;}
.breadcrumb{
  display:flex;gap:8px;font-size:12px;color:var(--gray);
  margin-bottom:20px;letter-spacing:1px;
}
.breadcrumb a{color:var(--gray);text-decoration:none;transition:color .3s;}
.breadcrumb a:hover{color:var(--gold);}
.breadcrumb span{color:var(--gold);}

.product-title-ar{
  font-size:36px;font-weight:700;color:var(--text);
  margin-bottom:8px;line-height:1.3;
}
.product-title-en{
  font-size:18px;color:var(--gold);letter-spacing:3px;
  font-family:'Playfair Display',serif;margin-bottom:20px;
}
.product-category-badge{
  display:inline-block;padding:6px 16px;
  background:rgba(201,168,76,.1);border:1px solid var(--gold);
  color:var(--gold);font-size:12px;letter-spacing:2px;
  margin-bottom:20px;
}

.product-price-section{
  display:flex;align-items:center;gap:20px;
  padding:20px 0;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);margin:30px 0;
}
.current-price{
  font-size:36px;font-family:'Playfair Display',serif;
  color:var(--gold);font-weight:700;
}
.original-price{
  font-size:20px;color:var(--gray);text-decoration:line-through;
}
.discount-badge{
  background:var(--red);color:#fff;padding:4px 12px;
  font-size:12px;font-weight:700;border-radius:4px;
}

.stock-status{
  display:flex;align-items:center;gap:8px;
  font-size:14px;letter-spacing:1px;margin:20px 0;
}
.stock-status.in-stock{color:var(--green);}
.stock-status.low-stock{color:#c9844c;}
.stock-status.out-of-stock{color:var(--red);}

.product-description{
  font-size:15px;line-height:1.8;color:var(--gray);
  margin:30px 0;
}

/* QUANTITY & ACTIONS */
.quantity-selector{
  display:flex;align-items:center;gap:15px;margin:30px 0;
}
.qty-label{font-size:14px;color:var(--text);letter-spacing:1px;}
.qty-controls{
  display:flex;align-items:center;border:1px solid var(--border);
}
.qty-btn{
  width:40px;height:40px;background:transparent;
  border:none;color:var(--text);font-size:20px;
  cursor:pointer;transition:all .3s;
}
.qty-btn:hover{background:rgba(201,168,76,.1);color:var(--gold);}
.qty-input{
  width:60px;height:40px;background:var(--bg3);
  border:none;text-align:center;color:var(--text);
  font-size:16px;font-family:'Tajawal',sans-serif;
}
.action-buttons{
  display:flex;gap:15px;margin-top:30px;
}
.add-to-cart-btn{
  flex:1;padding:16px 30px;
  background:var(--gold);border:none;
  color:var(--bg);font-family:'Tajawal',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .3s;
}
.add-to-cart-btn:hover{
  background:var(--gold-light);
  box-shadow:0 10px 30px rgba(201,168,76,.3);
}
.add-to-cart-btn:disabled{
  background:var(--gray);cursor:not-allowed;
  box-shadow:none;
}
.buy-now-btn{
  flex:1;padding:16px 30px;
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);font-family:'Tajawal',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .3s;
}
.buy-now-btn:hover{
  background:rgba(201,168,76,.1);
}
.buy-now-btn:disabled{
  border-color:var(--gray);color:var(--gray);
  cursor:not-allowed;
}

/* PRODUCT META */
.product-meta{
  margin-top:40px;padding-top:30px;
  border-top:1px solid var(--border);
}
.meta-row{
  display:flex;justify-content:space-between;
  padding:12px 0;font-size:14px;
}
.meta-label{color:var(--gray);}
.meta-value{color:var(--text);font-weight:500;}

/* REVIEWS SECTION */
.reviews-section{
  max-width:1400px;margin:0 auto 60px;
  padding:0 40px;
}
.section-title{
  font-size:28px;font-weight:700;color:var(--text);
  margin-bottom:30px;text-align:center;
}
.reviews-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;margin-bottom:40px;
}
.review-stat{
  background:var(--bg3);padding:20px;
  border:1px solid var(--border);text-align:center;
}
.stat-number{
  font-size:32px;font-family:'Playfair Display',serif;
  color:var(--gold);font-weight:700;
}
.stat-label{
  font-size:13px;color:var(--gray);letter-spacing:1px;
  margin-top:8px;
}

.review-card{
  background:var(--bg3);padding:24px;
  border:1px solid var(--border);margin-bottom:20px;
  animation:fadeUp .4s ease-out;
}
.review-header{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:15px;
}
.reviewer-name{
  font-size:15px;font-weight:700;color:var(--text);
}
.review-date{
  font-size:12px;color:var(--gray);
}
.review-stars{color:var(--gold);font-size:16px;}
.review-text{
  font-size:14px;line-height:1.7;color:var(--gray);
}

/* RELATED PRODUCTS */
.related-products{
  max-width:1400px;margin:0 auto 60px;
  padding:0 40px;
}
.products-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:30px;margin-top:30px;
}
.product-card{
  position:relative;background:var(--bg3);
  border:1px solid var(--border);transition:all .4s;
  overflow:hidden;
}
.product-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.05),transparent);
  opacity:0;transition:opacity .4s;
}
.product-card:hover{
  border-color:rgba(201,168,76,.5);
  transform:translateY(-5px);
  box-shadow:0 20px 60px rgba(0,0,0,.2),0 0 30px rgba(201,168,76,.1);
}
.product-card:hover::before{opacity:1;}
.product-img-wrap{
  position:relative;height:280px;overflow:hidden;
  background:var(--bg3);cursor:pointer;
}
.product-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .6s;
}
.product-card:hover .product-img-wrap img{transform:scale(1.05);}
.product-info{padding:20px;}
.product-name{
  font-size:18px;font-weight:700;color:var(--text);
  margin-bottom:6px;
}
.product-price{
  font-size:20px;font-family:'Playfair Display',serif;
  color:var(--gold);font-weight:700;
}

/* MODALS */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;
  z-index:2000;backdrop-filter:blur(5px);
}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--modal-bg);border:1px solid var(--border);
  max-width:500px;width:90%;max-height:90vh;overflow-y:auto;
  animation:modalIn .3s ease-out;
}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px;border-bottom:1px solid var(--border);
}
.modal-title{font-size:20px;font-weight:700;color:var(--text);}
.modal-close{
  background:transparent;border:none;color:var(--gray);
  font-size:24px;cursor:pointer;transition:color .3s;
}
.modal-close:hover{color:var(--gold);}
.modal-body{padding:24px;}

/* TOAST */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--bg3);border:1px solid var(--gold);
  color:var(--text);padding:14px 28px;font-size:14px;
  letter-spacing:1px;z-index:3000;opacity:0;transition:all .4s;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* LOADING */
.loading-spinner{
  display:flex;align-items:center;justify-content:center;
  min-height:400px;
}
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 1s linear infinite;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .product-detail-container{grid-template-columns:1fr;gap:40px;}
  .product-gallery{position:relative;top:0;}
}
@media(max-width:768px){
  nav{padding:15px 20px;}
  .nav-links{display:none;}
  .product-detail-container{margin-top:80px;padding:0 20px;}
  .main-image-wrap{height:350px;}
  .product-title-ar{font-size:26px;}
  .current-price{font-size:28px;}
  .action-buttons{flex-direction:column;}
  .reviews-section,.related-products{padding:0 20px;}
}

/* SECURITY: Hide sensitive data */
[data-sensitive]{user-select:none;}
</style>
</head>

  <ul class="nav-links">

</nav>

  <!-- Info -->
  <div class="product-info-section">
    <div class="breadcrumb">

      <span>/</span>
      <span id="crumb-product">...</span>
    </div>

    <div class="product-category-badge" id="categoryBadge"></div>

        <span class="meta-value" id="metaShipping"></span>
      </div>

  </div>
</div>

<!-- REVIEWS -->
<section class="reviews-section" id="reviewsSection" style="display:none;">
  <h2 class="section-title" id="reviewsTitle">التقييمات والمراجعات</h2>
  <div class="reviews-summary" id="reviewsSummary"></div>

</section>

<!-- RELATED PRODUCTS -->

</section>

<!-- REVIEW MODAL -->

  <div class="modal">

      <div class="modal-title" id="reviewModalTitle">إضافة تقييم</div>
      <button class="modal-close" onclick="closeReviewModal()">✕</button>

        <label style="display:block;margin-bottom:8px;font-size:14px;color:var(--text);">المراجعة</label>

      </div>
      <button onclick="submitReview()" style="width:100%;padding:14px;background:var(--gold);border:none;color:var(--bg);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;">إرسال التقييم</button>

</div>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://ubkjrqeencijfxtpitvm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVia2pycWVlbmNpamZ4dHBpdHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5OTQwNzEsImV4cCI6MjA2MDU3MDA3MX0.dP5K_gS_6aeUtTRT7rYaHv3yBnLxR8g9kCqPzQ5JYHM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let currentLang = localStorage.getItem('athr_lang') || 'ar';
let currentTheme = localStorage.getItem('athr_theme') || 'dark';
let currentUser = null;
let currentProduct = null;
let allProducts = [];
let cartCount = 0;
let currentRating = 0;
let currentQty = 1;

// ── SECURITY: XSS Prevention ──
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function sanitizeInput(str) {
  if (!str) return '';
  return str.replace(/[<>\"'&]/g, function(c) {
    const map = {'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'};
    return map[c] || c;
  });
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  applyLang();
  checkAuth();
  loadProduct();
  updateCartBadge();
});

// ── THEME ──
function applyTheme() {
  if (currentTheme === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.body.classList.remove('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('athr_theme', currentTheme);
  applyTheme();
}

// ── LANGUAGE ──
function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'عربي';
  
  // Update nav links
  document.getElementById('nav-home').textContent = isAr ? 'الرئيسية' : 'Home';
  document.getElementById('nav-products').textContent = isAr ? 'العطور' : 'Perfumes';
  document.getElementById('nav-about').textContent = isAr ? 'عن أثر' : 'About';
  document.getElementById('menu-profile').textContent = isAr ? 'حسابي' : 'My Profile';
  document.getElementById('menu-orders').textContent = isAr ? 'طلباتي' : 'My Orders';
  document.getElementById('menu-logout').textContent = isAr ? 'تسجيل خروج' : 'Logout';
  document.getElementById('crumb-home').textContent = isAr ? 'الرئيسية' : 'Home';
  document.getElementById('crumb-products').textContent = isAr ? 'العطور' : 'Perfumes';
  document.getElementById('qtyLabel').textContent = isAr ? 'الكمية:' : 'Quantity:';
  document.getElementById('addToCartText').textContent = isAr ? 'أضف إلى السلة' : 'Add to Cart';
  document.getElementById('buyNowText').textContent = isAr ? 'اشترِ الآن' : 'Buy Now';
  document.getElementById('meta-sku-label').textContent = isAr ? 'رقم المنتج:' : 'SKU:';
  document.getElementById('meta-category-label').textContent = isAr ? 'التصنيف:' : 'Category:';
  document.getElementById('meta-shipping-label').textContent = isAr ? 'الشحن:' : 'Shipping:';
  document.getElementById('reviewsTitle').textContent = isAr ? 'التقييمات والمراجعات' : 'Reviews';
  document.getElementById('relatedTitle').textContent = isAr ? 'عطور مشابهة' : 'Similar Perfumes';
  document.getElementById('reviewModalTitle').textContent = isAr ? 'إضافة تقييم' : 'Add Review';
}

function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('athr_lang', currentLang);
  applyLang();
  if (currentProduct) renderProductDetail(currentProduct);
}

// ── AUTH ──
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  updateUIForAuth();
}

function updateUIForAuth() {
  const avatar = document.getElementById('userAvatar');
  const dropdown = document.getElementById('userDropdown');
  
  if (currentUser) {
    const initials = (currentUser.email || '?')[0].toUpperCase();
    avatar.textContent = initials;
    avatar.style.display = 'flex';
  } else {
    avatar.textContent = '?';
    avatar.style.display = 'flex';
  }
  dropdown.classList.remove('open');
}

function toggleUserMenu() {
  document.getElementById('userDropdown').classList.toggle('open');
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  updateUIForAuth();
  showToast(currentLang === 'ar' ? 'تم تسجيل الخروج' : 'Logged out');
  setTimeout(() => window.location.href = 'index.html', 1000);
}

// ── LOAD PRODUCT ──
async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  
  if (!productId) {
    showToast(currentLang === 'ar' ? 'المنتج غير موجود' : 'Product not found');
    setTimeout(() => window.location.href = 'index.html', 2000);
    return;
  }
  
  try {
    // Fetch product with security validation
    const { data: product, error } = await sb
      .from('products')
      .select('*')
      .eq('id', productId)
      .eq('visible', true)
      .single();
    
    if (error || !product) {
      throw new Error('Product not found');
    }
    
    // Security: Validate product data
    currentProduct = sanitizeProductData(product);
    
    // Fetch all products for related items
    const { data: allProds } = await sb
      .from('products')
      .select('*')
      .eq('visible', true);
    allProducts = allProds || [];
    
    renderProductDetail(currentProduct);
    loadReviews(productId);
    loadRelatedProducts(currentProduct);
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('productDetail').style.display = 'grid';
    
    // Update page title
    const title = currentLang === 'ar' ? currentProduct.name : (currentProduct.name_en || currentProduct.name);
    document.getElementById('page-title').textContent = `${title} | أثر | ATHR`;
    document.getElementById('crumb-product').textContent = title;
    
  } catch (err) {
    console.error('Error loading product:', err);
    showToast(currentLang === 'ar' ? 'حدث خطأ في تحميل المنتج' : 'Error loading product');
    setTimeout(() => window.location.href = 'index.html', 2000);
  }
}

// ── SECURITY: Sanitize Product Data ──
function sanitizeProductData(product) {
  return {
    ...product,
    name: escapeHTML(product.name),
    name_en: product.name_en ? escapeHTML(product.name_en) : null,
    description: product.description ? escapeHTML(product.description) : '',
    image: product.image ? sanitizeURL(product.image) : '',
    category: product.category ? escapeHTML(product.category) : 'unisex',
    price: Number(product.price) || 0,
    original_price: product.original_price ? Number(product.original_price) : null,
    stock: Number(product.stock) || 0,
    sku: product.sku ? escapeHTML(product.sku) : ''
  };
}

function sanitizeURL(url) {
  try {
    const parsed = new URL(url);
    return parsed.href;
  } catch {
    return '';
  }
}

// ── RENDER PRODUCT ──
function renderProductDetail(product) {
  const isAr = currentLang === 'ar';
  
  // Images
  const mainImage = document.getElementById('mainImage');
  const placeholder = document.getElementById('imagePlaceholder');
  
  if (product.image) {
    mainImage.src = product.image;
    mainImage.alt = product.name;
    mainImage.style.display = 'block';
    placeholder.style.display = 'none';
    
    // Thumbnails (for now just the main image repeated)
    document.getElementById('thumbnailGrid').innerHTML = `
      <div class="thumbnail active" onclick="changeMainImage('${product.image}')">
        <img src="${product.image}" alt="${product.name}">
      </div>
    `;
  } else {
    mainImage.style.display = 'none';
    placeholder.style.display = 'flex';
  }
  
  // Title
  document.getElementById('productTitleAr').textContent = product.name;
  document.getElementById('productTitleEn').textContent = product.name_en || '';
  
  // Category
  const catLabels = { men: isAr ? 'رجالي' : 'Men', women: isAr ? 'نسائي' : 'Women', unisex: isAr ? 'مشترك' : 'Unisex' };
  const catBadge = document.getElementById('categoryBadge');
  catBadge.textContent = catLabels[product.category] || product.category;
  document.getElementById('metaCategory').textContent = catLabels[product.category] || product.category;
  
  // Price
  document.getElementById('currentPrice').textContent = `${product.price} ${isAr ? 'جنيه' : 'EGP'}`;
  
  if (product.original_price && product.original_price > product.price) {
    document.getElementById('originalPrice').style.display = 'inline';
    document.getElementById('originalPrice').textContent = `${product.original_price} ${isAr ? 'جنيه' : 'EGP'}`;
    const discount = Math.round(((product.original_price - product.price) / product.original_price) * 100);
    document.getElementById('discountBadge').style.display = 'inline';
    document.getElementById('discountBadge').textContent = `-${discount}%`;
  } else {
    document.getElementById('originalPrice').style.display = 'none';
    document.getElementById('discountBadge').style.display = 'none';
  }
  
  // Stock
  const stockEl = document.getElementById('stockStatus');
  if (product.stock > 10) {
    stockEl.className = 'stock-status in-stock';
    stockEl.innerHTML = `<span>✓</span> <span>${isAr ? 'متوفر' : 'In Stock'}</span>`;
  } else if (product.stock > 0) {
    stockEl.className = 'stock-status low-stock';
    stockEl.innerHTML = `<span>⚠</span> <span>${isAr ? `متبقي ${product.stock}` : `Only ${product.stock} left`}</span>`;
  } else {
    stockEl.className = 'stock-status out-of-stock';
    stockEl.innerHTML = `<span>✗</span> <span>${isAr ? 'نفذت الكمية' : 'Out of Stock'}</span>`;
  }
  
  // Description
  document.getElementById('productDescription').textContent = product.description || (isAr ? 'لا يوجد وصف متاح' : 'No description available');
  
  // Quantity
  currentQty = 1;
  document.getElementById('qtyInput').value = 1;
  document.getElementById('maxStock').textContent = product.stock > 0 ? `(max: ${product.stock})` : '';
  
  // Buttons
  const addToCartBtn = document.getElementById('addToCartBtn');
  const buyNowBtn = document.getElementById('buyNowBtn');
  
  if (product.stock <= 0) {
    addToCartBtn.disabled = true;
    buyNowBtn.disabled = true;
    addToCartBtn.style.opacity = '0.5';
    buyNowBtn.style.opacity = '0.5';
  } else {
    addToCartBtn.disabled = false;
    buyNowBtn.disabled = false;
    addToCartBtn.style.opacity = '1';
    buyNowBtn.style.opacity = '1';
  }
  
  // Meta
  document.getElementById('metaSku').textContent = product.sku || 'N/A';
  document.getElementById('metaShipping').textContent = isAr ? 'شحن مجاني للطلبات فوق 500 جنيه' : 'Free shipping over 500 EGP';
}

function changeMainImage(src) {
  document.getElementById('mainImage').src = src;
  document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
  event.target.closest('.thumbnail').classList.add('active');
}

function changeQty(delta) {
  if (!currentProduct || currentProduct.stock <= 0) return;
  const newVal = Math.max(1, Math.min(currentProduct.stock, currentQty + delta));
  currentQty = newVal;
  document.getElementById('qtyInput').value = newVal;
}

// ── CART ──
async function addToCart() {
  if (!currentUser) {
    showToast(currentLang === 'ar' ? 'سجل دخولك أولاً لإضافة للسلة' : 'Please login first');
    setTimeout(() => window.location.href = 'index.html', 1500);
    return;
  }
  
  if (!currentProduct || currentProduct.stock <= 0) {
    showToast(currentLang === 'ar' ? 'المنتج غير متوفر' : 'Product not available');
    return;
  }
  
  try {
    const { data: existing } = await sb
      .from('cart_items')
      .select('id,quantity')
      .eq('user_id', currentUser.id)
      .eq('product_id', currentProduct.id)
      .single();
    
    const totalQty = existing ? existing.quantity + currentQty : currentQty;
    
    if (totalQty > currentProduct.stock) {
      showToast(currentLang === 'ar' ? `الكمية المتاحة: ${currentProduct.stock}` : `Only ${currentProduct.stock} available`);
      return;
    }
    
    if (existing) {
      await sb.from('cart_items').update({ quantity: totalQty }).eq('id', existing.id);
    } else {
      await sb.from('cart_items').insert({ 
        user_id: currentUser.id, 
        product_id: currentProduct.id, 
        quantity: currentQty 
      });
    }
    
    showToast(currentLang === 'ar' ? '✅ تم الإضافة للسلة' : '✅ Added to cart');
    updateCartBadge();
  } catch (err) {
    console.error('Add to cart error:', err);
    showToast(currentLang === 'ar' ? 'حدث خطأ' : 'Error occurred');
  }
}

function buyNow() {
  if (!currentUser) {
    showToast(currentLang === 'ar' ? 'سجل دخولك أولاً لإتمام الشراء' : 'Please login to buy');
    setTimeout(() => window.location.href = 'index.html', 1500);
    return;
  }
  
  if (!currentProduct || currentProduct.stock <= 0) {
    showToast(currentLang === 'ar' ? 'المنتج غير متوفر' : 'Product not available');
    return;
  }
  
  // Redirect to order with product info
  const orderData = encodeURIComponent(JSON.stringify({
    product_id: currentProduct.id,
    quantity: currentQty
  }));
  window.location.href = `index.html#order?data=${orderData}`;
}

async function updateCartBadge() {
  if (!currentUser) {
    document.getElementById('cart-badge').style.display = 'none';
    return;
  }
  
  try {
    const { data: items } = await sb
      .from('cart_items')
      .select('quantity')
      .eq('user_id', currentUser.id);
    
    const total = items ? items.reduce((sum, item) => sum + item.quantity, 0) : 0;
    cartCount = total;
    
    const badge = document.getElementById('cart-badge');
    if (total > 0) {
      badge.textContent = total;
      badge.style.display = 'flex';
      badge.classList.add('show');
    } else {
      badge.style.display = 'none';
    }
  } catch (err) {
    console.error('Cart badge error:', err);
  }
}

// ── REVIEWS ──
async function loadReviews(productId) {
  try {
    const { data: reviews, error } = await sb
      .from('product_reviews')
      .select(`
        *,
        profiles:user_id (full_name)
      `)
      .eq('product_id', productId)
      .order('created_at', { ascending: false });
    
    if (error || !reviews || reviews.length === 0) {
      document.getElementById('reviewsSection').style.display = 'none';
      return;
    }
    
    document.getElementById('reviewsSection').style.display = 'block';
    
    // Calculate stats
    const avgRating = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
    const totalReviews = reviews.length;
    const fiveStars = reviews.filter(r => r.rating === 5).length;
    
    const isAr = currentLang === 'ar';
    document.getElementById('reviewsSummary').innerHTML = `
      <div class="review-stat">
        <div class="stat-number">${avgRating.toFixed(1)}</div>
        <div class="stat-label">${isAr ? 'متوسط التقييم' : 'Average Rating'}</div>
      </div>
      <div class="review-stat">
        <div class="stat-number">${totalReviews}</div>
        <div class="stat-label">${isAr ? 'مراجعة' : 'Reviews'}</div>
      </div>
      <div class="review-stat">
        <div class="stat-number">${Math.round((fiveStars / totalReviews) * 100)}%</div>
        <div class="stat-label">${isAr ? '5 نجوم' : '5 Stars'}</div>
      </div>
    `;
    
    // Render reviews
    document.getElementById('reviewsList').innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="review-header">
          <div>
            <div class="reviewer-name">${escapeHTML(r.profiles?.full_name || 'Anonymous')}</div>
            <div class="review-date">${new Date(r.created_at).toLocaleDateString(isAr ? 'ar-EG' : 'en-US')}</div>
          </div>
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
        </div>
        <div class="review-text">${escapeHTML(r.review || '')}</div>
      </div>
    `).join('');
    
  } catch (err) {
    console.error('Load reviews error:', err);
  }
}

function openReviewModal() {
  if (!currentUser) {
    showToast(currentLang === 'ar' ? 'سجل دخولك أولاً لإضافة تقييم' : 'Please login to review');
    return;
  }
  currentRating = 0;
  updateStarDisplay();
  document.getElementById('reviewText').value = '';
  document.getElementById('reviewModal').classList.add('active');
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('active');
}

function setRating(stars) {
  currentRating = stars;
  updateStarDisplay();
}

function updateStarDisplay() {
  const stars = document.querySelectorAll('#starRating span');
  stars.forEach((s, i) => {
    s.textContent = i < currentRating ? '★' : '☆';
    s.style.color = i < currentRating ? 'var(--gold)' : 'var(--gray)';
  });
}

async function submitReview() {
  if (!currentUser) {
    showToast(currentLang === 'ar' ? 'يجب تسجيل الدخول' : 'Must be logged in');
    return;
  }
  
  if (currentRating === 0) {
    showToast(currentLang === 'ar' ? 'اختر عدد النجوم' : 'Select star rating');
    return;
  }
  
  const reviewText = document.getElementById('reviewText').value.trim();
  if (!reviewText) {
    showToast(currentLang === 'ar' ? 'اكتب مراجعة' : 'Write a review');
    return;
  }
  
  try {
    // Security: Sanitize input before sending
    const sanitizedReview = sanitizeInput(reviewText);
    
    const { error } = await sb.from('product_reviews').insert({
      product_id: currentProduct.id,
      user_id: currentUser.id,
      rating: currentRating,
      review: sanitizedReview
    });
    
    if (error) throw error;
    
    showToast(currentLang === 'ar' ? '✅ تم إرسال التقييم' : '✅ Review submitted');
    closeReviewModal();
    loadReviews(currentProduct.id);
  } catch (err) {
    console.error('Submit review error:', err);
    showToast(currentLang === 'ar' ? 'حدث خطأ' : 'Error occurred');
  }
}

// ── RELATED PRODUCTS ──
function loadRelatedProducts(product) {
  const related = allProducts
    .filter(p => p.id !== product.id && p.category === product.category)
    .slice(0, 4);
  
  if (related.length === 0) {
    document.getElementById('relatedSection').style.display = 'none';
    return;
  }
  
  document.getElementById('relatedSection').style.display = 'block';
  const isAr = currentLang === 'ar';
  
  document.getElementById('relatedGrid').innerHTML = related.map(p => `
    <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
      <div class="product-img-wrap">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy">` : '<div class="img-placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray);">ATHR</div>'}
      </div>
      <div class="product-info">
        <div class="product-name">${isAr ? p.name : (p.name_en || p.name)}</div>
        <div class="product-price">${p.price} ${isAr ? 'جنيه' : 'EGP'}</div>
      </div>
    </div>
  `).join('');
}

// ── TOAST ──
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Close dropdowns when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.user-menu')) {
    document.getElementById('userDropdown').classList.remove('open');
  }
});
</script>
